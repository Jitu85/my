<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Formula Bank</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="app-container">
    <header class="hero">
      <h1 class="logo glow">Ultimate Formula Bank</h1>
      <p class="creator-tag">Created by Abhijit Kumar Misra</p>

      <div class="search-container glass">
        <div class="search-inputs">
          <input type="text" id="searchInput" placeholder="Search for a formula..." autocomplete="off" aria-label="Search formulas" />
          <select id="branchSelect" aria-label="Filter by branch">
            <option value="All">All Branches</option>
          </select>
        </div>
      </div>
    </header>

    <main class="content">
      <div id="resultsInfo" class="results-info">Loading formulas...</div>
      <div id="formulasGrid" class="formulas-grid"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
