<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to My Beautiful Site!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(120deg, #8ec5fc, #e0c3fc, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradientBG 12s ease-in-out infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 1s;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .container {
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12), 0 1.5px 5px rgba(0,0,0,0.07);
      padding: 40px 30px;
      text-align: center;
      max-width: 95vw;
      width: 420px;
    }
    h1 {
      letter-spacing: 2px;
      background: linear-gradient(90deg,#f093fb,#f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.5em;
      margin-bottom: 0.4em;
      margin-top: 0;
      transition: color 0.5s;
    }
    .greeting {
      font-size: 1.3em;
      color: #555;
      margin-bottom: 1em;
    }
    .fun-button {
      margin-top: 1.5em;
      font-size: 1.15em;
      color: white;
      background: linear-gradient(90deg,#fc6076,#ff9a44);
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(252,96,118,0.12);
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .fun-button:active {
      transform: scale(0.95) rotate(-2deg);
      box-shadow: 0 2px 25px rgba(252,96,118,0.18);
    }
    .sparkle {
      font-size: 1.6em;
      margin-left: 0.3em;
      vertical-align: middle;
      animation: sparkle 1s infinite alternate;
    }
    @keyframes sparkle {
      from { filter: brightness(1); }
      to { filter: brightness(1.8) drop-shadow(0 0 6px #fc6076); }
    }
    @media (max-width: 500px) {
      .container { padding: 20px 6px;}
      h1 { font-size: 2em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌈 Welcome to My Site!</h1>
    <div class="greeting" id="greeting"></div>
    <button class="fun-button" onclick="funAction()">
      Click Me <span class="sparkle" id="sparkle">✨</span>
    </button>
    <div id="message" style="margin-top:1em; font-size:1.08em; color:#f5576c; min-height:2em;"></div>
  </div>
  <script>
    // Greeting based on time of day
    function getGreeting() {
      const now = new Date();
      const hour = now.getHours();
      if (hour < 6) return "It's very early! 🌄";
      else if (hour < 12) return "Good morning! ☀️";
      else if (hour < 18) return "Good afternoon! 🌤️";
      else return "Good evening! 🌙";
    }
    document.getElementById("greeting").innerText = getGreeting();

    // Fun action for the button
    const messages = [
      "Wishing you an amazing day! 😃",
      "You just made the page a little happier! 🥳",
      "Stay curious. Keep learning. 🚀",
      "You are awesome! 🤩",
      "Send this site to a friend! 💌",
      "Smile! 😊"
    ];
    function funAction() {
      const idx = Math.floor(Math.random() * messages.length);
      document.getElementById("message").innerText = messages[idx];
      // Bounce sparkle
      const sparkle = document.getElementById("sparkle");
      sparkle.style.transform = "scale(1.45) rotate(-15deg)";
      setTimeout(() => {
        sparkle.style.transform = "";
      }, 350);
    }
  </script>
</body>
</html>
